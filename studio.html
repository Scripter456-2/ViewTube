<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViewTube Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080810;--bg2:#0f0f1a;--surface:#1a1a2e;--surface2:#22223a;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#a78bfa;--red:#ff4757;--green:#22c55e;--text:#f0f0ff;--text2:#a0a0c0;--text3:#5a5a80;--radius:12px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

  /* TOPBAR */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;background:rgba(8,8,16,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 24px;}
  .logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--red));border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .logo-icon svg{width:18px;height:18px;fill:white;}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;}
  .logo-text span{color:var(--accent2);}
  .studio-label{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--accent2);background:rgba(108,99,255,0.15);padding:4px 12px;border-radius:20px;border:1px solid rgba(108,99,255,0.3);}
  .topbar-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .tb-btn{display:flex;align-items:center;gap:6px;text-decoration:none;background:var(--accent);color:white;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;transition:.2s;}
  .tb-btn:hover{background:var(--accent2);}
  .back-link{text-decoration:none;color:var(--text2);font-size:14px;display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:8px;transition:.15s;}
  .back-link:hover{background:var(--surface);color:var(--text);}

  .page{max-width:1100px;margin:0 auto;padding:80px 24px 60px;}

  /* CHANNEL HEADER */
  .ch-header{display:flex;align-items:center;gap:20px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:28px;}
  .ch-avatar{width:72px;height:72px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--surface);border:3px solid var(--border);}
  .ch-avatar img{width:100%;height:100%;object-fit:cover;}
  .ch-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
  .ch-handle{color:var(--text2);font-size:14px;margin-top:2px;}
  .ch-actions{margin-left:auto;display:flex;gap:8px;}
  .ch-action-btn{display:flex;align-items:center;gap:6px;text-decoration:none;background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;transition:.2s;cursor:pointer;}
  .ch-action-btn:hover{background:var(--surface2);color:var(--text);}

  /* STATS ROW */
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
  @media(max-width:700px){.stats-row{grid-template-columns:1fr 1fr;}}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
  .stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
  .stat-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:2px;}
  .stat-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}

  /* VIDEO LIST */
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text2);}
  .empty-icon{font-size:48px;margin-bottom:12px;}

  .video-table{width:100%;border-collapse:collapse;}
  .video-table th{text-align:left;font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px;border-bottom:1px solid var(--border);}
  .video-table td{padding:12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:14px;}
  .video-table tr:hover td{background:var(--surface);}
  .video-row-thumb{width:100px;height:56px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--surface);}
  .video-row-thumb img{width:100%;height:100%;object-fit:cover;}
  .video-row-info{display:flex;align-items:center;gap:12px;}
  .video-row-title{font-weight:600;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .video-row-date{color:var(--text3);font-size:12px;margin-top:2px;}
  .status-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
  .status-public{background:rgba(34,197,94,0.15);color:#4ade80;}
  .status-banned{background:rgba(255,71,87,0.15);color:#ff6b7a;}
  .action-cell{display:flex;gap:6px;align-items:center;}
  .act-btn{background:none;border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;transition:.15s;}
  .act-btn:hover{background:var(--surface2);color:var(--text);}
  .act-btn.danger:hover{border-color:var(--red);color:var(--red);}

  /* SUBSCRIBERS CHART (simple bar) */
  .sub-chart{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:28px;}
  .sub-chart-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;}
  .sub-chart-body{display:flex;align-items:flex-end;gap:8px;height:80px;}
  .sub-bar{flex:1;border-radius:4px 4px 0 0;background:linear-gradient(to top,var(--accent),var(--accent2));min-height:4px;transition:.5s;}

  /* CONFIRM MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .modal-bg.open{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:360px;max-width:90vw;}
  .modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;}
  .modal-body{color:var(--text2);font-size:14px;margin-bottom:24px;line-height:1.6;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  .modal-cancel{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:10px 20px;border-radius:10px;cursor:pointer;font-size:14px;}
  .modal-confirm{background:var(--red);border:none;color:white;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;}
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <span class="logo-text">View<span>Tube</span></span>
  </a>
  <span class="studio-label">Studio</span>
  <div class="topbar-right">
    <a href="upload.html" class="tb-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Upload
    </a>
    <a href="index.html" class="back-link">← ViewTube</a>
  </div>
</header>

<div class="page" id="page">
  <div style="color:var(--text2);text-align:center;padding:60px">Loading studio…</div>
</div>

<!-- DELETE MODAL -->
<div class="modal-bg" id="deleteModal">
  <div class="modal">
    <div class="modal-title">Delete Video?</div>
    <div class="modal-body">This action cannot be undone. The video and all its comments will be permanently removed.</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" id="confirmDeleteBtn">Delete</button>
    </div>
  </div>
</div>

<script src="vt-auth.js"></script>
<script>
let channel, user, myVideos;

async function init() {
  await VT.initSeedData();
  if (!VT.requireAuth('login.html?redirect=studio.html')) return;
  user = VT.currentUser();
  channel = VT.getChannelByOwner(user.id);
  if (!channel) { window.location.href = 'create-channel.html'; return; }
  myVideos = VT.getChannelVideos(channel.id);
  renderPage();
}

function fmtNum(n) { return VT.fmtSubs(n); }

function renderPage() {
  const totalViews = myVideos.reduce((s, v) => s + (v.views || 0), 0);
  const totalLikes = myVideos.reduce((s, v) => s + (v.likes || 0), 0);

  // Fake 7-day sub history
  const subHistory = Array.from({length:7}, (_,i) => Math.max(0, (channel.subscriberCount||0) - Math.floor(Math.random()*50)*(7-i)));
  const maxSub = Math.max(...subHistory, 1);

  document.getElementById('page').innerHTML = `
    <!-- CHANNEL HEADER -->
    <div class="ch-header">
      <div class="ch-avatar"><img src="${channel.avatar}" alt="${channel.name}" onerror="this.style.background='var(--accent)'"></div>
      <div>
        <div class="ch-name">${channel.name} ${VT.badgeHTML(channel)}</div>
        <div class="ch-handle">${channel.handle} · ${fmtNum(channel.subscriberCount||0)} subscribers</div>
      </div>
      <div class="ch-actions">
        <a href="channel.html?id=${channel.id}" class="ch-action-btn">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          View Channel
        </a>
        <button class="ch-action-btn" onclick="editChannel()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit Channel
        </button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(108,99,255,0.15)">
          <svg width="20" height="20" fill="none" stroke="var(--accent2)" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="stat-num">${fmtNum(channel.subscriberCount||0)}</div>
        <div class="stat-label">Subscribers</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(255,71,87,0.12)">
          <svg width="20" height="20" fill="none" stroke="var(--red)" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </div>
        <div class="stat-num">${myVideos.length}</div>
        <div class="stat-label">Videos</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(34,197,94,0.12)">
          <svg width="20" height="20" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <div class="stat-num">${fmtNum(totalViews)}</div>
        <div class="stat-label">Total Views</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:rgba(167,139,250,0.12)">
          <svg width="20" height="20" fill="none" stroke="var(--accent2)" stroke-width="2" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg>
        </div>
        <div class="stat-num">${fmtNum(totalLikes)}</div>
        <div class="stat-label">Total Likes</div>
      </div>
    </div>

    <!-- SUB CHART -->
    <div class="sub-chart">
      <div class="sub-chart-title">Subscriber growth (7 days)</div>
      <div class="sub-chart-body">
        ${subHistory.map((v,i) => `<div class="sub-bar" style="height:${Math.max(5,(v/maxSub)*100)}%" title="Day ${i+1}: ${fmtNum(v)}"></div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px">
        ${['7d ago','6d','5d','4d','3d','2d','Today'].map(d=>`<span style="font-size:11px;color:var(--text3)">${d}</span>`).join('')}
      </div>
    </div>

    <!-- VIDEO LIST -->
    <div class="section-header">
      <div class="section-title">Your Videos (${myVideos.length})</div>
      <a href="upload.html" class="ch-action-btn" style="text-decoration:none">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Upload New
      </a>
    </div>

    ${myVideos.length === 0 ? `
      <div class="empty-state">
        <div class="empty-icon">🎬</div>
        <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px">No videos yet</div>
        <div style="margin-bottom:20px">Upload your first video to get started</div>
        <a href="upload.html" style="background:var(--accent);color:white;text-decoration:none;padding:12px 28px;border-radius:12px;font-weight:700">Upload Video</a>
      </div>
    ` : `
      <table class="video-table">
        <thead>
          <tr>
            <th>Video</th>
            <th>Status</th>
            <th>Views</th>
            <th>Likes</th>
            <th>Uploaded</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${myVideos.map(v => `
            <tr>
              <td>
                <div class="video-row-info">
                  <div class="video-row-thumb"><img src="${v.thumbnail}" alt="${v.title}" loading="lazy" onerror="this.style.background='var(--surface)'"></div>
                  <div>
                    <div class="video-row-title">${v.title}</div>
                    <div class="video-row-date">${v.duration}</div>
                  </div>
                </div>
              </td>
              <td><span class="status-badge ${v.IsBanned ? 'status-banned' : 'status-public'}">${v.IsBanned ? '🚫 Banned' : '✓ Public'}</span></td>
              <td>${fmtNum(v.views||0)}</td>
              <td>${fmtNum(v.likes||0)}</td>
              <td style="color:var(--text3);font-size:12px">${v.uploadedAgo}</td>
              <td>
                <div class="action-cell">
                  <a href="watch.html?id=${v.id}" class="act-btn">
                    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    View
                  </a>
                  <button class="act-btn danger" onclick="confirmDelete('${v.id}')">
                    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                    Delete
                  </button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `}
  `;
}

function editChannel() {
  const name = prompt('Channel name:', channel.name);
  if (!name) return;
  const desc = prompt('Description:', channel.description||'');
  const r = VT.updateChannel(channel.id, { name: name.trim(), description: (desc||'').trim() }, user.id);
  if (r.ok) { channel = r.channel; renderPage(); }
}

let deleteTargetId = '';
function confirmDelete(videoId) {
  deleteTargetId = videoId;
  document.getElementById('deleteModal').classList.add('open');
  document.getElementById('confirmDeleteBtn').onclick = () => {
    VT.deleteVideo(videoId, user.id);
    myVideos = VT.getChannelVideos(channel.id);
    closeModal();
    renderPage();
  };
}
function closeModal() { document.getElementById('deleteModal').classList.remove('open'); }

init();
</script>
</body>
</html>
