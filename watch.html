<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch — ViewTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810; --bg2: #0f0f1a; --bg3: #14141f;
    --surface: #1a1a2e; --surface2: #22223a;
    --border: rgba(255,255,255,0.06);
    --accent: #6c63ff; --accent2: #a78bfa; --accent-glow: rgba(108,99,255,0.3);
    --red: #ff4757; --gold: #ffd700;
    --text: #f0f0ff; --text2: #a0a0c0; --text3: #5a5a80;
    --verified: #60a5fa; --gold-v: #f59e0b; --black-v: #e2e2e2;
    --radius: 12px; --player-radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height:100vh; }

  /* TOPBAR */
  .topbar {
    position: fixed; top:0; left:0; right:0; z-index:100;
    height:60px; background:rgba(8,8,16,0.9); backdrop-filter:blur(20px);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:16px; padding:0 20px;
  }
  .logo { display:flex; align-items:center; gap:8px; text-decoration:none; }
  .logo-icon { width:32px; height:32px; background:linear-gradient(135deg, var(--accent), var(--red)); border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .logo-icon svg { width:18px; height:18px; fill:white; }
  .logo-text { font-family:'Syne', sans-serif; font-weight:800; font-size:18px; color:var(--text); letter-spacing:-0.5px; }
  .logo-text span { color:var(--accent2); }
  .search-wrap { flex:1; max-width:500px; margin:0 auto; display:flex; }
  .search-input { flex:1; background:var(--surface); border:1px solid var(--border); border-right:none; color:var(--text); padding:0 16px; height:38px; border-radius:var(--radius) 0 0 var(--radius); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; }
  .search-input:focus { border-color:var(--accent); }
  .search-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text2); height:38px; width:48px; border-radius:0 var(--radius) var(--radius) 0; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .topbar-right { display:flex; align-items:center; gap:10px; margin-left:auto; }
  .icon-btn { background:none; border:none; color:var(--text2); cursor:pointer; padding:8px; border-radius:8px; display:flex; transition:.2s; }
  .icon-btn:hover { background:var(--surface); color:var(--text); }
  .avatar-btn { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--red)); border:none; cursor:pointer; font-family:'Syne',sans-serif; font-weight:700; color:white; font-size:14px; }

  /* LAYOUT */
  .watch-layout { display:grid; grid-template-columns: 1fr 380px; gap:24px; padding:80px 24px 40px; max-width:1400px; margin:0 auto; }
  @media(max-width:1100px) { .watch-layout { grid-template-columns:1fr; } .related-panel { display:none; } }

  /* PLAYER */
  .player-wrap { position:relative; aspect-ratio:16/9; background:#000; border-radius:var(--player-radius); overflow:hidden; box-shadow:0 0 60px rgba(0,0,0,0.8), 0 0 120px var(--accent-glow); }
  video { width:100%; height:100%; object-fit:contain; display:block; }

  /* CUSTOM PLAYER CONTROLS */
  .player-controls {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(transparent, rgba(0,0,0,0.9));
    padding:40px 16px 16px;
    transform:translateY(0); transition:.3s;
  }
  .player-wrap:not(:hover) .player-controls { transform:translateY(100%); }
  .player-wrap:hover .player-controls { transform:translateY(0); }
  .player-wrap.paused .player-controls { transform:translateY(0); }

  .progress-bar-wrap { position:relative; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; cursor:pointer; margin-bottom:12px; transition:.1s; }
  .progress-bar-wrap:hover { height:6px; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; position:relative; pointer-events:none; }
  .progress-thumb { width:14px; height:14px; background:white; border-radius:50%; position:absolute; top:50%; right:-7px; transform:translateY(-50%); display:none; box-shadow:0 0 6px rgba(0,0,0,0.5); }
  .progress-bar-wrap:hover .progress-thumb { display:block; }
  .buffered-fill { height:100%; background:rgba(255,255,255,0.3); border-radius:2px; position:absolute; top:0; left:0; pointer-events:none; }

  .controls-row { display:flex; align-items:center; gap:10px; }
  .ctrl-btn { background:none; border:none; color:white; cursor:pointer; padding:6px; border-radius:6px; display:flex; align-items:center; justify-content:center; transition:.15s; }
  .ctrl-btn:hover { background:rgba(255,255,255,0.1); }
  .volume-wrap { display:flex; align-items:center; gap:6px; }
  .volume-slider { width:70px; height:4px; accent-color:white; cursor:pointer; appearance:none; -webkit-appearance:none; background:rgba(255,255,255,0.3); border-radius:2px; }
  .volume-slider::-webkit-slider-thumb { appearance:none; width:12px; height:12px; background:white; border-radius:50%; cursor:pointer; }
  .time-display { font-size:13px; color:rgba(255,255,255,0.9); font-weight:500; margin:0 4px; white-space:nowrap; }
  .ctrl-spacer { flex:1; }
  .quality-badge { font-size:11px; font-weight:700; background:rgba(255,255,255,0.15); color:white; padding:2px 8px; border-radius:4px; cursor:pointer; }

  /* PLAY OVERLAY */
  .play-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .play-big { width:72px; height:72px; background:rgba(108,99,255,0.85); border-radius:50%; display:flex; align-items:center; justify-content:center; transition:.2s; backdrop-filter:blur(8px); }
  .play-big:hover { transform:scale(1.1); background:var(--accent); }
  .play-overlay.hidden { display:none; }

  /* VIDEO INFO */
  .video-info-section { margin-top:16px; }
  .video-title-full { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; line-height:1.3; margin-bottom:12px; }
  .video-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .action-btn {
    display:flex; align-items:center; gap:6px;
    background:var(--surface); border:1px solid var(--border);
    color:var(--text2); padding:8px 16px; border-radius:20px;
    cursor:pointer; font-size:13px; font-weight:500; transition:.2s;
  }
  .action-btn:hover { background:var(--surface2); color:var(--text); }
  .action-btn.liked { background:var(--accent); color:white; border-color:var(--accent); }
  .like-count { font-weight:600; }
  .dislike-divider { width:1px; height:20px; background:var(--border); }

  /* CHANNEL ROW */
  .channel-row { display:flex; align-items:center; gap:12px; padding:16px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin-bottom:16px; }
  .channel-avatar { width:46px; height:46px; border-radius:50%; overflow:hidden; background:var(--surface); flex-shrink:0; }
  .channel-avatar img { width:100%; height:100%; object-fit:cover; }
  .channel-name { font-weight:600; font-size:15px; display:flex; align-items:center; gap:6px; }
  .channel-subs { font-size:13px; color:var(--text2); }
  .subscribe-btn { margin-left:auto; background:var(--text); color:var(--bg); border:none; padding:9px 20px; border-radius:20px; font-weight:600; font-size:14px; cursor:pointer; transition:.2s; }
  .subscribe-btn:hover { background:var(--accent2); color:white; }
  .subscribe-btn.subscribed { background:var(--surface); color:var(--text2); }

  /* DESCRIPTION */
  .desc-box { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:24px; }
  .desc-stats { font-size:14px; font-weight:600; margin-bottom:8px; }
  .desc-text { font-size:14px; color:var(--text2); line-height:1.6; }
  .desc-text.clamped { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .desc-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .desc-tag { font-size:12px; color:var(--accent2); cursor:pointer; }
  .desc-toggle { font-size:13px; font-weight:600; color:var(--text); cursor:pointer; margin-top:8px; }

  /* BADGE */
  .badge { display:inline-flex; align-items:center; flex-shrink:0; }
  .badge-verified { color:var(--verified); }
  .badge-gold { color:var(--gold-v); }
  .badge-black { color:var(--black-v); }

  /* COMMENTS */
  .comments-section h3 { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; margin-bottom:16px; }
  .comment-input-row { display:flex; gap:12px; margin-bottom:24px; }
  .comment-avatar-self { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--red)); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; }
  .comment-input-wrap { flex:1; }
  .comment-input { width:100%; background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; padding:8px 0; outline:none; }
  .comment-input:focus { border-color:var(--accent); }
  .comment-actions-row { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; display:none; }
  .comment-actions-row.visible { display:flex; }
  .comment-cancel-btn { background:none; border:none; color:var(--text2); cursor:pointer; padding:8px 16px; border-radius:20px; font-size:13px; }
  .comment-submit-btn { background:var(--accent); color:white; border:none; padding:8px 20px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; }

  .comment-list { display:flex; flex-direction:column; gap:20px; }
  .comment { display:flex; gap:12px; }
  .comment-avatar { width:36px; height:36px; border-radius:50%; overflow:hidden; flex-shrink:0; background:var(--surface); }
  .comment-avatar img { width:100%; height:100%; object-fit:cover; }
  .comment-body { flex:1; }
  .comment-header { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
  .comment-user { font-size:13px; font-weight:600; }
  .comment-time { font-size:12px; color:var(--text3); }
  .comment-text { font-size:14px; color:var(--text2); line-height:1.5; }
  .comment-footer { display:flex; align-items:center; gap:12px; margin-top:6px; }
  .comment-like-btn { background:none; border:none; color:var(--text3); cursor:pointer; font-size:12px; display:flex; align-items:center; gap:4px; transition:.15s; }
  .comment-like-btn:hover { color:var(--text); }
  .comment-reply-btn { background:none; border:none; color:var(--text3); cursor:pointer; font-size:12px; font-weight:600; transition:.15s; }
  .comment-reply-btn:hover { color:var(--accent2); }
  .replies { margin-top:12px; margin-left:0; display:flex; flex-direction:column; gap:14px; }
  .reply { display:flex; gap:10px; }
  .reply-avatar { width:28px; height:28px; border-radius:50%; overflow:hidden; flex-shrink:0; background:var(--surface); }
  .reply-avatar img { width:100%; height:100%; object-fit:cover; }
  .view-replies-btn { background:none; border:none; color:var(--accent2); cursor:pointer; font-size:13px; font-weight:600; margin-top:6px; }

  /* RELATED */
  .related-panel { display:flex; flex-direction:column; gap:12px; }
  .related-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:4px; }
  .rel-card { display:flex; gap:10px; cursor:pointer; text-decoration:none; color:inherit; transition:.15s; }
  .rel-card:hover .rel-thumb-wrap { opacity:0.8; }
  .rel-thumb-wrap { width:160px; height:90px; border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--surface); }
  .rel-thumb-wrap img { width:100%; height:100%; object-fit:cover; }
  .rel-duration { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,0.85); color:white; font-size:11px; font-weight:600; padding:1px 5px; border-radius:4px; }
  .rel-thumb-inner { position:relative; width:100%; height:100%; }
  .rel-info { flex:1; min-width:0; }
  .rel-title { font-size:13px; font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:4px; }
  .rel-channel { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:3px; }
  .rel-stats { font-size:11px; color:var(--text3); }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar" id="topbar"></header>

<div class="watch-layout">
  <!-- LEFT: PLAYER + INFO -->
  <div>
    <!-- PLAYER -->
    <div class="player-wrap" id="playerWrap">
      <video id="mainVideo" preload="auto">
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
      </video>

      <!-- Play overlay -->
      <div class="play-overlay" id="playOverlay" onclick="togglePlay()">
        <div class="play-big" id="playBig">
          <svg width="30" height="30" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>

      <!-- Controls -->
      <div class="player-controls" id="playerControls">
        <!-- Progress -->
        <div class="progress-bar-wrap" id="progressWrap" onclick="seekVideo(event)">
          <div class="buffered-fill" id="bufferedFill"></div>
          <div class="progress-fill" id="progressFill" style="width:0%">
            <div class="progress-thumb"></div>
          </div>
        </div>

        <div class="controls-row">
          <!-- Play/Pause -->
          <button class="ctrl-btn" id="playBtn" onclick="togglePlay()">
            <svg id="playIcon" width="22" height="22" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>

          <!-- Skip back/forward -->
          <button class="ctrl-btn" onclick="skipVideo(-10)" title="Back 10s">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05 1-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
          </button>
          <button class="ctrl-btn" onclick="skipVideo(10)" title="Forward 10s">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M18 13c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6v4l5-5-5-5v4c-4.42 0-8 3.58-8 8s3.58 8 8 8 8-3.58 8-8h-2z"/></svg>
          </button>

          <!-- Volume -->
          <div class="volume-wrap">
            <button class="ctrl-btn" id="muteBtn" onclick="toggleMute()">
              <svg id="volumeIcon" width="20" height="20" fill="white" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
            <input class="volume-slider" id="volumeSlider" type="range" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
          </div>

          <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
          <span class="ctrl-spacer"></span>

          <!-- Quality -->
          <span class="quality-badge">HD</span>

          <!-- Theater -->
          <button class="ctrl-btn" onclick="toggleTheater()" title="Theater mode">
            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2" stroke="white" stroke-width="2" fill="none"/></svg>
          </button>

          <!-- Fullscreen -->
          <button class="ctrl-btn" onclick="toggleFullscreen()" title="Fullscreen">
            <svg id="fsIcon" width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- VIDEO INFO -->
    <div class="video-info-section" id="videoInfoSection">
      <div class="video-title-full" id="videoTitle">Loading...</div>

      <div class="video-actions">
        <button class="action-btn" id="likeBtn" onclick="toggleLike()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
          <span class="like-count" id="likeCount">0</span>
        </button>
        <div class="dislike-divider"></div>
        <button class="action-btn" id="dislikeBtn" onclick="toggleDislike()">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/><path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/></svg>
        </button>
        <button class="action-btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Share
        </button>
        <button class="action-btn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          Save
        </button>
        <button class="action-btn" style="margin-left:auto">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
      </div>

      <!-- CHANNEL ROW -->
      <div class="channel-row" id="channelRow">
        <div class="channel-avatar"><img id="channelAvatar" src="" alt=""></div>
        <div>
          <div class="channel-name" id="channelName">—</div>
          <div class="channel-subs" id="channelSubs">—</div>
        </div>
        <button class="subscribe-btn" id="subBtn" onclick="toggleSubscribe()">Subscribe</button>
      </div>

      <!-- DESCRIPTION -->
      <div class="desc-box">
        <div class="desc-stats" id="descStats">— views · —</div>
        <div class="desc-text clamped" id="descText">—</div>
        <div class="desc-tags" id="descTags"></div>
        <div class="desc-toggle" onclick="toggleDesc()">Show more</div>
      </div>

      <!-- COMMENTS -->
      <div class="comments-section">
        <h3 id="commentCount">Comments</h3>
        <div class="comment-input-row">
          <div class="comment-avatar-self">V</div>
          <div class="comment-input-wrap">
            <input class="comment-input" type="text" placeholder="Add a comment..." id="commentInput"
              onfocus="document.getElementById('commentActionsRow').classList.add('visible')"
              onkeydown="if(event.key==='Enter')submitComment()">
            <div class="comment-actions-row" id="commentActionsRow">
              <button class="comment-cancel-btn" onclick="cancelComment()">Cancel</button>
              <button class="comment-submit-btn" onclick="submitComment()">Comment</button>
            </div>
          </div>
        </div>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: RELATED -->
  <aside class="related-panel" id="relatedPanel">
    <div class="related-title">Up Next</div>
  </aside>
</div>

<script src="vt-auth.js"></script>
<script>
let currentVideo = null, descExpanded = false;
const videoEl = document.getElementById('mainVideo');
const params   = new URLSearchParams(location.search);
const videoId  = params.get('id') || 'v1';

async function loadData() {
  await VT.initSeedData();
  VT.injectTopbarStyles();
  document.getElementById('topbar').innerHTML = VT.renderTopbar();

  currentVideo = VT.getVideo(videoId) || VT.getVideos()[0];
  if (!currentVideo) { document.getElementById('videoInfoSection').innerHTML = '<p style="color:var(--text2);padding:40px">Video not found or has been removed.</p>'; return; }

  // Banned check
  if (currentVideo.IsBanned) {
    document.getElementById('videoInfoSection').innerHTML = `
      <div style="background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.25);border-radius:14px;padding:32px;text-align:center;margin-top:16px">
        <div style="font-size:48px;margin-bottom:12px">🚫</div>
        <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#ff6b7a;margin-bottom:8px">Video Unavailable</div>
        <div style="color:var(--text2)">This video has been removed for violating ViewTube's policies.</div>
      </div>`;
    document.getElementById('playerWrap').style.display = 'none';
    renderRelated(currentVideo.id);
    return;
  }

  // Record a view after 5 seconds of watching
  setTimeout(() => VT.recordView(videoId), 5000);

  renderPage();
}

function renderPage() {
  const v   = currentVideo;
  const ch  = VT.getChannel(v.channelId) || {};
  const user = VT.currentUser();

  document.title = `${v.title} — ViewTube`;

  // Set video source
  if (v.videoUrl) {
    videoEl.src = v.videoUrl;
  }

  // Title + like state
  document.getElementById('videoTitle').textContent = v.title;

  const liked    = user ? VT.hasLiked(user.id, v.id)    : false;
  const disliked = user ? VT.hasDisliked(user.id, v.id) : false;
  const subbed   = user && ch.id ? VT.isSubscribed(user.id, ch.id) : false;

  document.getElementById('likeBtn').className    = 'action-btn' + (liked    ? ' liked' : '');
  document.getElementById('dislikeBtn').className = 'action-btn' + (disliked ? ' liked' : '');
  document.getElementById('likeCount').textContent = VT.fmtSubs(v.likes || 0);

  // Channel row
  document.getElementById('channelAvatar').src = ch.avatar || '';
  document.getElementById('channelAvatar').onerror = function(){ this.style.background='var(--accent)'; };
  document.getElementById('channelName').innerHTML = `<a href="channel.html?id=${ch.id}" style="color:inherit;text-decoration:none">${ch.name || 'Unknown'}</a> ${VT.badgeHTML(ch, 15)}`;
  document.getElementById('channelSubs').textContent = `${VT.fmtSubs(ch.subscriberCount || 0)} subscribers`;

  const subBtn = document.getElementById('subBtn');
  if (user && ch.ownerId === user.id) {
    subBtn.textContent = 'Your Channel';
    subBtn.disabled = true;
    subBtn.style.opacity = '.5';
  } else {
    subBtn.textContent = subbed ? 'Subscribed' : 'Subscribe';
    subBtn.className   = 'subscribe-btn' + (subbed ? ' subscribed' : '');
  }

  // Description
  document.getElementById('descStats').textContent = `${VT.fmtSubs(v.views || 0)} views · ${v.uploadedAgo || ''}`;
  document.getElementById('descText').textContent = v.description || '';
  document.getElementById('descTags').innerHTML = (v.tags || []).map(t => `<span class="desc-tag">#${t}</span>`).join('');

  // Comment input: show only if logged in
  const commentInputWrap = document.querySelector('.comment-input-row');
  if (!user && commentInputWrap) {
    commentInputWrap.innerHTML = `<div style="background:var(--surface);border-radius:12px;padding:16px;font-size:14px;color:var(--text2);text-align:center;width:100%">
      <a href="login.html" style="color:var(--accent2);font-weight:600">Sign in</a> to leave a comment
    </div>`;
  }

  renderComments(v.id);
  renderRelated(v.id);
}

function renderComments(vid) {
  const list = VT.getVideoComments(vid);
  document.getElementById('commentCount').textContent = `${list.length} Comments`;
  document.getElementById('commentList').innerHTML = list.map(c => `
    <div class="comment" id="comment-${c.id}">
      <div class="comment-avatar"><img src="${c.avatar || ''}" alt="${c.user}" onerror="this.style.background='var(--accent)'"></div>
      <div class="comment-body">
        <div class="comment-header">
          <span class="comment-user">${c.user}</span>
          <span class="comment-time">${c.time || VT.timeAgo(c.postedAt || Date.now())}</span>
        </div>
        <div class="comment-text">${c.text}</div>
        <div class="comment-footer">
          <button class="comment-like-btn" onclick="likeComment(this,'${c.id}')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg>
            <span id="clikes-${c.id}">${VT.fmtSubs(c.likes || 0)}</span>
          </button>
          <button class="comment-reply-btn" onclick="toggleReplies('${c.id}', this)">
            ${c.replies && c.replies.length ? `▶ ${c.replies.length} ${c.replies.length===1?'reply':'replies'}` : 'Reply'}
          </button>
        </div>
        ${c.replies && c.replies.length ? `
          <div class="replies" id="replies-${c.id}" style="display:none">
            ${c.replies.map(r => `
              <div class="reply">
                <div class="reply-avatar"><img src="${r.avatar || ''}" alt="${r.user}" onerror="this.style.background='var(--accent)'"></div>
                <div class="comment-body">
                  <div class="comment-header">
                    <span class="comment-user">${r.user}</span>
                    <span class="comment-time">${r.time || VT.timeAgo(r.postedAt || Date.now())}</span>
                  </div>
                  <div class="comment-text">${r.text}</div>
                  <div class="comment-footer">
                    <button class="comment-like-btn">
                      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg>
                      <span>${VT.fmtSubs(r.likes || 0)}</span>
                    </button>
                  </div>
                </div>
              </div>`).join('')}
          </div>` : ''}
      </div>
    </div>`).join('');
}

function renderRelated(currentId) {
  const panel  = document.getElementById('relatedPanel');
  const others = VT.getVideos().filter(v => v.id !== currentId);
  panel.innerHTML = `<div class="related-title">Up Next</div>` + others.map(v => {
    const ch = VT.getChannel(v.channelId) || {};
    return `<a href="watch.html?id=${v.id}" class="rel-card">
      <div class="rel-thumb-wrap">
        <div class="rel-thumb-inner">
          <img src="${v.thumbnail}" alt="${v.title}" style="width:100%;height:100%;object-fit:cover" loading="lazy">
          <span class="rel-duration">${v.duration || ''}</span>
        </div>
      </div>
      <div class="rel-info">
        <div class="rel-title">${v.title}</div>
        <div class="rel-channel"><a href="channel.html?id=${ch.id}" style="color:inherit;text-decoration:none">${ch.name || ''}</a> ${VT.badgeHTML(ch, 12)}</div>
        <div class="rel-stats">${VT.fmtSubs(v.views || 0)} views</div>
      </div>
    </a>`;
  }).join('');
}

// ── PLAYER CONTROLS ────────────────────────────────────────────
function togglePlay() {
  if (videoEl.paused) videoEl.play(); else videoEl.pause();
  updatePlayIcon();
}
function updatePlayIcon() {
  const icon = document.getElementById('playIcon');
  const overlay = document.getElementById('playOverlay');
  const wrap = document.getElementById('playerWrap');
  if (!videoEl.paused) {
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    overlay.classList.add('hidden'); wrap.classList.remove('paused');
  } else {
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    overlay.classList.remove('hidden'); wrap.classList.add('paused');
  }
}
videoEl.addEventListener('click', togglePlay);
videoEl.addEventListener('play', updatePlayIcon);
videoEl.addEventListener('pause', updatePlayIcon);
videoEl.addEventListener('timeupdate', () => {
  if (!videoEl.duration) return;
  const pct = (videoEl.currentTime / videoEl.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeDisplay').textContent = `${fmtTime(videoEl.currentTime)} / ${fmtTime(videoEl.duration)}`;
});
videoEl.addEventListener('progress', () => {
  if (videoEl.buffered.length > 0 && videoEl.duration) {
    const pct = (videoEl.buffered.end(videoEl.buffered.length - 1) / videoEl.duration) * 100;
    document.getElementById('bufferedFill').style.width = pct + '%';
  }
});
function fmtTime(s) {
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}
function seekVideo(e) {
  const wrap = document.getElementById('progressWrap');
  const rect = wrap.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  videoEl.currentTime = pct * videoEl.duration;
}
let dragging = false;
document.getElementById('progressWrap').addEventListener('mousedown', e => { dragging = true; seekVideo(e); });
document.addEventListener('mousemove', e => { if (dragging) seekVideo(e); });
document.addEventListener('mouseup', () => { dragging = false; });
function skipVideo(s) { videoEl.currentTime = Math.max(0, Math.min(videoEl.duration || 0, videoEl.currentTime + s)); }
let muted = false;
function toggleMute() {
  muted = !muted; videoEl.muted = muted;
  const icon = document.getElementById('volumeIcon');
  icon.innerHTML = muted
    ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
    : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
}
function setVolume(v) { videoEl.volume = parseFloat(v); if (v > 0 && muted) { muted = false; videoEl.muted = false; } }
function toggleFullscreen() {
  if (!document.fullscreenElement) document.getElementById('playerWrap').requestFullscreen();
  else document.exitFullscreen();
}
function toggleTheater() { document.querySelector('.watch-layout').classList.toggle('theater'); }
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') skipVideo(10);
  if (e.code === 'ArrowLeft')  skipVideo(-10);
  if (e.code === 'KeyM')       toggleMute();
  if (e.code === 'KeyF')       toggleFullscreen();
});

// ── INTERACTIONS ────────────────────────────────────────────────
function toggleLike() {
  const user = VT.currentUser();
  if (!user) { window.location.href = `login.html?redirect=watch.html?id=${videoId}`; return; }
  const result = VT.toggleLike(user.id, videoId);
  document.getElementById('likeBtn').className    = 'action-btn' + (result.liked ? ' liked' : '');
  document.getElementById('dislikeBtn').className = 'action-btn';
  document.getElementById('likeCount').textContent = VT.fmtSubs(result.likes);
  // Update local
  if (currentVideo) { currentVideo.likes = result.likes; currentVideo.dislikes = result.dislikes; }
}

function toggleDislike() {
  const user = VT.currentUser();
  if (!user) { window.location.href = `login.html?redirect=watch.html?id=${videoId}`; return; }
  const result = VT.toggleDislike(user.id, videoId);
  document.getElementById('dislikeBtn').className = 'action-btn' + (result.disliked ? ' liked' : '');
  document.getElementById('likeBtn').className    = 'action-btn';
  document.getElementById('likeCount').textContent = VT.fmtSubs(result.likes);
  if (currentVideo) { currentVideo.likes = result.likes; currentVideo.dislikes = result.dislikes; }
}

function toggleSubscribe() {
  const user = VT.currentUser();
  if (!user) { window.location.href = `login.html?redirect=watch.html?id=${videoId}`; return; }
  const ch = VT.getChannel(currentVideo.channelId);
  if (!ch) return;
  const result = VT.toggleSubscribe(user.id, ch.id);
  const btn = document.getElementById('subBtn');
  btn.textContent = result.subscribed ? 'Subscribed' : 'Subscribe';
  btn.className   = 'subscribe-btn' + (result.subscribed ? ' subscribed' : '');
  document.getElementById('channelSubs').textContent = `${VT.fmtSubs(result.count)} subscribers`;
}

function toggleDesc() {
  descExpanded = !descExpanded;
  document.getElementById('descText').classList.toggle('clamped', !descExpanded);
  document.querySelector('.desc-toggle').textContent = descExpanded ? 'Show less' : 'Show more';
}

function likeComment(btn, id) {
  btn.style.color = 'var(--accent2)';
  const span = document.getElementById('clikes-' + id);
  if (span) {
    const n = parseInt(span.textContent.replace('K','000').replace('.','')) || 0;
    span.textContent = VT.fmtSubs(n + 1);
  }
}

function toggleReplies(id, btn) {
  const el = document.getElementById(`replies-${id}`);
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'flex';
  btn.textContent = open ? `▶ ${el.children.length} ${el.children.length===1?'reply':'replies'}` : `▼ Hide replies`;
}

function submitComment() {
  const user  = VT.currentUser();
  const input = document.getElementById('commentInput');
  const text  = input.value.trim();
  if (!text) return;
  if (!user) { window.location.href = `login.html?redirect=watch.html?id=${videoId}`; return; }
  const result = VT.addComment(videoId, { userId: user.id, text });
  if (result.ok) {
    input.value = '';
    cancelComment();
    renderComments(videoId);
  }
}

function cancelComment() {
  document.getElementById('commentActionsRow').classList.remove('visible');
  document.getElementById('commentInput').blur();
}

loadData();
</script>
</body>
