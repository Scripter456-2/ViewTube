<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trending — ViewTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080810;--bg2:#0f0f1a;--surface:#1a1a2e;--surface2:#22223a;--border:rgba(255,255,255,0.06);--accent:#6c63ff;--accent2:#a78bfa;--accent-glow:rgba(108,99,255,0.3);--red:#ff4757;--text:#f0f0ff;--text2:#a0a0c0;--text3:#5a5a80;--verified:#60a5fa;--gold-v:#f59e0b;--black-v:#e2e2e2;--radius:12px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

  /* TOPBAR */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;background:rgba(8,8,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 20px;}
  .logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--red));border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .logo-icon svg{width:18px;height:18px;fill:white;}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--text);}
  .logo-text span{color:var(--accent2);}
  .nav-links{display:flex;gap:4px;margin-left:16px;}
  .nav-link{text-decoration:none;color:var(--text2);font-size:14px;font-weight:500;padding:6px 14px;border-radius:8px;transition:.15s;}
  .nav-link:hover{background:var(--surface);color:var(--text);}
  .nav-link.active{color:var(--text);background:var(--surface);}
  .topbar-right{margin-left:auto;display:flex;gap:10px;align-items:center;}

  .page{padding:80px 24px 60px;max-width:1200px;margin:0 auto;}

  /* HERO */
  .trending-hero{background:linear-gradient(135deg,rgba(108,99,255,0.15),rgba(255,71,87,0.1));border:1px solid var(--border);border-radius:20px;padding:40px;margin-bottom:36px;position:relative;overflow:hidden;}
  .trending-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(108,99,255,0.2),transparent 60%);pointer-events:none;}
  .trending-hero-label{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:white;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 12px;border-radius:20px;margin-bottom:14px;}
  .trending-hero-title{font-family:'Syne',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:800;line-height:1.1;margin-bottom:8px;}
  .trending-hero-sub{font-size:15px;color:var(--text2);}
  .trending-stats{display:flex;gap:36px;margin-top:24px;flex-wrap:wrap;}
  .trend-stat-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent2);}
  .trend-stat-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

  /* TABS */
  .tab-bar{display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid var(--border);}
  .tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;padding:12px 22px;cursor:pointer;margin-bottom:-1px;transition:.2s;}
  .tab:hover{color:var(--text);}
  .tab.active{color:var(--accent2);border-bottom-color:var(--accent2);}

  /* TRENDING LIST */
  .trending-list{display:flex;flex-direction:column;gap:14px;}
  .trend-card{display:grid;grid-template-columns:56px 200px 1fr auto;gap:20px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;text-decoration:none;color:inherit;transition:.2s;}
  .trend-card:hover{background:var(--surface2);border-color:rgba(108,99,255,0.5);transform:translateX(4px);}
  .trend-rank{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;color:var(--text3);text-align:center;line-height:1;}
  .trend-rank.top3{color:var(--accent2);}
  .trend-thumb{aspect-ratio:16/9;border-radius:8px;overflow:hidden;position:relative;background:var(--bg2);}
  .trend-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .trend-duration{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.85);color:white;font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;}
  .trend-info{min-width:0;}
  .trend-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;line-height:1.3;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .trend-channel{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:5px;margin-bottom:6px;}
  .fire-bar{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .fire-bg{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
  .fire-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--red));border-radius:2px;}
  .trend-tags{display:flex;gap:6px;flex-wrap:wrap;}
  .trend-tag{font-size:11px;color:var(--accent2);background:rgba(108,99,255,0.12);padding:2px 8px;border-radius:10px;}
  .trend-metrics{text-align:right;flex-shrink:0;min-width:80px;}
  .trend-views{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
  .trend-views-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
  .trend-likes{font-size:12px;color:var(--text2);margin-top:4px;display:flex;align-items:center;gap:4px;justify-content:flex-end;}

  /* BADGE */
  .badge{display:inline-flex;align-items:center;}
  .badge-verified{color:var(--verified);}
  .badge-gold{color:var(--gold-v);}
  .badge-black{color:var(--black-v);}

  /* LOADING SKELETON */
  @keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
  .skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:1200px 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius);}

  /* EMPTY */
  .empty-state{text-align:center;padding:80px 20px;color:var(--text2);}
  .empty-state svg{opacity:.3;margin-bottom:16px;}

  @media(max-width:800px){
    .trend-card{grid-template-columns:40px 1fr;grid-template-rows:auto auto;}
    .trend-thumb{display:none;}
    .trend-metrics{grid-column:2;}
    .nav-links{display:none;}
  }
</style>
</head>
<body>

<header class="topbar" id="topbar">
  <!-- rendered by vt-auth.js -->
</header>

<div class="page">
  <!-- HERO -->
  <div class="trending-hero">
    <div class="trending-hero-label">
      <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
      Live Trending
    </div>
    <div class="trending-hero-title">What the World<br>is Watching</div>
    <div class="trending-hero-sub">Real-time most viewed videos across all categories</div>
    <div class="trending-stats">
      <div class="trend-stat">
        <div class="trend-stat-num" id="totalViews">—</div>
        <div class="trend-stat-label">Total Views</div>
      </div>
      <div class="trend-stat">
        <div class="trend-stat-num" id="videoCount">—</div>
        <div class="trend-stat-label">Videos</div>
      </div>
      <div class="trend-stat">
        <div class="trend-stat-num" id="topCategory">—</div>
        <div class="trend-stat-label">Top Category</div>
      </div>
    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- LIST -->
  <div class="trending-list" id="trendingList">
    <!-- skeleton placeholders while loading -->
    <div class="skeleton" style="height:90px;"></div>
    <div class="skeleton" style="height:90px;opacity:.7;"></div>
    <div class="skeleton" style="height:90px;opacity:.4;"></div>
  </div>
</div>

<script src="vt-auth.js"></script>
<script>
let allVideos = [];
let allChannels = [];
let activeTab = 'all';

async function loadData() {
  // Init topbar
  await VT.initSeedData();
  VT.injectTopbarStyles();
  document.getElementById('topbar').innerHTML = VT.renderTopbar();

  // Get data from VT (localStorage) — if empty, fall back to direct JSON fetch
  allVideos   = VT.getVideos();
  allChannels = VT.getChannels();

  if (allVideos.length === 0) {
    // localStorage was empty — fetch directly as fallback
    try {
      const [v, c] = await Promise.all([
        fetch('videos.json').then(r => r.json()),
        fetch('channels.json').then(r => r.json()),
      ]);
      allVideos   = v.filter(x => !x.IsBanned);
      allChannels = c;
    } catch(e) {
      allVideos   = [];
      allChannels = [];
    }
  }

  // Build category tabs dynamically from actual data
  const cats = ['all', ...new Set(allVideos.map(v => v.category).filter(Boolean))];
  const tabBar = document.getElementById('tabBar');
  tabBar.innerHTML = cats.map(cat => `
    <button class="tab ${cat === 'all' ? 'active' : ''}" onclick="switchTab(this, '${cat}')">
      ${cat === 'all' ? 'All' : cat}
    </button>`).join('');

  // Update hero stats
  const totalViews = allVideos.reduce((s, v) => s + (v.views || 0), 0);
  const catCounts  = {};
  allVideos.forEach(v => { catCounts[v.category] = (catCounts[v.category]||0) + (v.views||0); });
  const topCat = Object.entries(catCounts).sort((a,b) => b[1]-a[1])[0]?.[0] || '—';

  document.getElementById('totalViews').textContent = VT.fmtSubs(totalViews);
  document.getElementById('videoCount').textContent = allVideos.length;
  document.getElementById('topCategory').textContent = topCat;

  renderList('all');
}

function getChannel(id) {
  return allChannels.find(c => c.id === id) || VT.getChannel(id) || {};
}

function renderList(cat) {
  const list = document.getElementById('trendingList');
  let videos = [...allVideos].sort((a, b) => (b.views||0) - (a.views||0));
  if (cat !== 'all') videos = videos.filter(v => v.category === cat);

  if (videos.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:6px">No videos yet</div>
        <div style="font-size:14px">Upload some videos to see them trending here</div>
      </div>`;
    return;
  }

  const maxViews = Math.max(...videos.map(v => v.views||0), 1);

  list.innerHTML = videos.map((v, i) => {
    const ch  = getChannel(v.channelId);
    const pct = ((v.views||0) / maxViews) * 100;
    return `
    <a href="watch.html?id=${v.id}" class="trend-card">
      <div class="trend-rank ${i < 3 ? 'top3' : ''}">${i + 1}</div>
      <div class="trend-thumb">
        <img src="${v.thumbnail}" alt="${v.title}" loading="lazy" onerror="this.style.background='var(--surface2)'">
        <span class="trend-duration">${v.duration || ''}</span>
      </div>
      <div class="trend-info">
        <div class="trend-title">${v.title}</div>
        <div class="trend-channel">
          <a href="channel.html?id=${ch.id}" style="color:inherit;text-decoration:none" onclick="event.stopPropagation()">${ch.name || 'Unknown'}</a>
          ${VT.badgeHTML(ch, 13)}
          <span style="color:var(--text3)">· ${v.uploadedAgo || ''}</span>
        </div>
        <div class="fire-bar">
          <div class="fire-bg"><div class="fire-fill" style="width:${pct}%"></div></div>
          <span style="font-size:11px;color:var(--text3);white-space:nowrap">${Math.round(pct)}%</span>
        </div>
        <div class="trend-tags">${(v.tags||[]).slice(0,4).map(t=>`<span class="trend-tag">#${t}</span>`).join('')}</div>
      </div>
      <div class="trend-metrics">
        <div class="trend-views">${v.viewsLabel || VT.fmtSubs(v.views||0)}</div>
        <div class="trend-views-label">views</div>
        <div class="trend-likes">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg>
          ${VT.fmtSubs(v.likes||0)}
        </div>
      </div>
    </a>`;
  }).join('');
}

function switchTab(btn, cat) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeTab = cat;
  renderList(cat);
}

loadData();
</script>
</body>
</html>
