<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trending — ViewTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080810; --bg2: #0f0f1a; --surface: #1a1a2e; --surface2: #22223a;
    --border: rgba(255,255,255,0.06);
    --accent: #6c63ff; --accent2: #a78bfa; --accent-glow: rgba(108,99,255,0.3);
    --red: #ff4757;
    --text: #f0f0ff; --text2: #a0a0c0; --text3: #5a5a80;
    --verified: #60a5fa; --gold-v: #f59e0b; --black-v: #e2e2e2;
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  .topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:60px; background:rgba(8,8,16,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; padding:0 20px; }
  .logo { display:flex; align-items:center; gap:8px; text-decoration:none; }
  .logo-icon { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),var(--red)); border-radius:8px; display:flex; align-items:center; justify-content:center; }
  .logo-icon svg { width:18px; height:18px; fill:white; }
  .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:var(--text); }
  .logo-text span { color:var(--accent2); }
  .nav-links { display:flex; gap:4px; margin-left:20px; }
  .nav-link { text-decoration:none; color:var(--text2); font-size:14px; font-weight:500; padding:6px 14px; border-radius:8px; transition:.15s; }
  .nav-link:hover { background:var(--surface); color:var(--text); }
  .nav-link.active { color:var(--text); background:var(--surface); }
  .topbar-right { margin-left:auto; display:flex; gap:10px; align-items:center; }
  .avatar-btn { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--red)); border:none; cursor:pointer; font-family:'Syne',sans-serif; font-weight:700; color:white; font-size:14px; }

  .page { padding:80px 24px 40px; max-width:1200px; margin:0 auto; }

  /* HERO */
  .trending-hero {
    background: linear-gradient(135deg, rgba(108,99,255,0.15), rgba(255,71,87,0.1));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }
  .trending-hero::before {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse at top right, rgba(108,99,255,0.2), transparent 60%);
    pointer-events:none;
  }
  .trending-hero-label { display:inline-flex; align-items:center; gap:6px; background:var(--red); color:white; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; padding:4px 12px; border-radius:20px; margin-bottom:12px; }
  .trending-hero-title { font-family:'Syne',sans-serif; font-size:clamp(28px,5vw,48px); font-weight:800; line-height:1.1; margin-bottom:8px; }
  .trending-hero-sub { font-size:15px; color:var(--text2); }
  .trending-stats { display:flex; gap:32px; margin-top:24px; }
  .trend-stat { }
  .trend-stat-num { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--accent2); }
  .trend-stat-label { font-size:12px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; }

  /* TABS */
  .tab-bar { display:flex; gap:8px; margin-bottom:28px; border-bottom:1px solid var(--border); padding-bottom:0; }
  .tab { background:none; border:none; color:var(--text2); font-size:14px; font-weight:600; padding:10px 20px; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:.2s; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent2); border-bottom-color:var(--accent2); }

  /* TRENDING LIST */
  .trending-list { display:flex; flex-direction:column; gap:16px; }
  .trend-card {
    display:grid; grid-template-columns:56px 200px 1fr auto;
    gap:20px; align-items:center;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); padding:16px 20px;
    cursor:pointer; text-decoration:none; color:inherit;
    transition:.2s;
  }
  .trend-card:hover { background:var(--surface2); border-color:var(--accent); transform:translateX(4px); }
  .trend-rank { font-family:'Syne',sans-serif; font-size:36px; font-weight:800; color:var(--text3); text-align:center; }
  .trend-rank.top3 { color:var(--accent2); }
  .trend-thumb { aspect-ratio:16/9; border-radius:8px; overflow:hidden; position:relative; background:var(--bg); }
  .trend-thumb img { width:100%; height:100%; object-fit:cover; }
  .trend-duration { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,0.85); color:white; font-size:11px; font-weight:600; padding:2px 6px; border-radius:4px; }
  .trend-info { min-width:0; }
  .trend-title { font-size:16px; font-weight:700; line-height:1.3; margin-bottom:6px; font-family:'Syne',sans-serif; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .trend-channel { font-size:13px; color:var(--text2); display:flex; align-items:center; gap:5px; margin-bottom:4px; }
  .trend-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .trend-tag { font-size:11px; color:var(--accent2); background:rgba(108,99,255,0.1); padding:2px 8px; border-radius:10px; }
  .trend-metrics { text-align:right; flex-shrink:0; }
  .trend-views { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--text); }
  .trend-views-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:0.5px; }
  .trend-likes { font-size:12px; color:var(--text2); margin-top:4px; display:flex; align-items:center; gap:4px; justify-content:flex-end; }

  /* BADGE */
  .badge { display:inline-flex; align-items:center; }
  .badge-verified { color:var(--verified); }
  .badge-gold { color:var(--gold-v); }
  .badge-black { color:var(--black-v); }

  /* FIRE INDICATOR */
  .fire-bar { display:flex; align-items:center; gap:6px; margin-top:6px; }
  .fire-fill { height:4px; background:linear-gradient(90deg,var(--accent),var(--red)); border-radius:2px; }
  .fire-bg { flex:1; height:4px; background:var(--surface2); border-radius:2px; overflow:hidden; }

  @media(max-width:800px) {
    .trend-card { grid-template-columns:40px 1fr; grid-template-rows:auto auto; }
    .trend-thumb { display:none; }
    .trend-metrics { grid-column:2; }
  }
</style>
</head>
<body>
<header class="topbar" id="topbar"></header>

<div class="page">
  <!-- HERO -->
  <div class="trending-hero">
    <div class="trending-hero-label">
      <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>
      Live Trending
    </div>
    <div class="trending-hero-title">What the World<br>is Watching</div>
    <div class="trending-hero-sub">Real-time most viewed videos across all categories</div>
    <div class="trending-stats">
      <div class="trend-stat">
        <div class="trend-stat-num" id="totalViews">—</div>
        <div class="trend-stat-label">Total Views Today</div>
      </div>
      <div class="trend-stat">
        <div class="trend-stat-num" id="trendCount">—</div>
        <div class="trend-stat-label">Trending Videos</div>
      </div>
      <div class="trend-stat">
        <div class="trend-stat-num" id="topCategory">—</div>
        <div class="trend-stat-label">Top Category</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab active" data-tab="all" onclick="switchTab(this,'all')">All</button>
    <button class="tab" data-tab="Technology" onclick="switchTab(this,'Technology')">Technology</button>
    <button class="tab" data-tab="Music" onclick="switchTab(this,'Music')">Music</button>
    <button class="tab" data-tab="Documentary" onclick="switchTab(this,'Documentary')">Documentary</button>
    <button class="tab" data-tab="Film" onclick="switchTab(this,'Film')">Film</button>
  </div>

  <div class="trending-list" id="trendingList"></div>
</div>

<script src="vt-auth.js"></script>
<script>
let activeTab = 'all';

async function loadData() {
  await VT.initSeedData();
  VT.injectTopbarStyles();
  document.getElementById('topbar').innerHTML = VT.renderTopbar('trending');

  const videos  = VT.getVideos();
  const trending = [...videos].sort((a, b) => b.views - a.views);
  const totalV   = trending.reduce((s, v) => s + (v.views || 0), 0);
  const trendCount = trending.filter(v => v.trending).length;
  const catCounts  = {};
  trending.forEach(v => { catCounts[v.category] = (catCounts[v.category] || 0) + (v.views || 0); });
  const topCat = Object.entries(catCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || '—';

  document.getElementById('totalViews').textContent  = VT.fmtSubs(totalV);
  document.getElementById('trendCount').textContent  = trendCount;
  document.getElementById('topCategory').textContent = topCat;

  renderList('all');
}

function renderList(cat) {
  const videos  = VT.getVideos();
  const list    = document.getElementById('trendingList');
  const maxViews = Math.max(...videos.map(v => v.views || 0), 1);
  let sorted = [...videos].sort((a, b) => b.views - a.views);
  if (cat !== 'all') sorted = sorted.filter(v => v.category === cat);

  list.innerHTML = sorted.length ? sorted.map((v, i) => {
    const ch  = VT.getChannel(v.channelId) || {};
    const pct = ((v.views || 0) / maxViews) * 100;
    return `<a href="watch.html?id=${v.id}" class="trend-card">
      <div class="trend-rank ${i < 3 ? 'top3' : ''}">${i + 1}</div>
      <div class="trend-thumb">
        <img src="${v.thumbnail}" alt="${v.title}" loading="lazy">
        <span class="trend-duration">${v.duration || ''}</span>
      </div>
      <div class="trend-info">
        <div class="trend-title">${v.title}</div>
        <div class="trend-channel">
          <a href="channel.html?id=${ch.id}" style="color:inherit;text-decoration:none">${ch.name || 'Unknown'}</a>
          ${VT.badgeHTML(ch, 13)} · ${v.uploadedAgo || ''}
        </div>
        <div class="fire-bar">
          <div class="fire-bg"><div class="fire-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="trend-tags">${(v.tags || []).map(t => `<span class="trend-tag">#${t}</span>`).join('')}</div>
      </div>
      <div class="trend-metrics">
        <div class="trend-views">${v.viewsLabel || VT.fmtSubs(v.views || 0)}</div>
        <div class="trend-views-label">views</div>
        <div class="trend-likes">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg>
          ${VT.fmtSubs(v.likes || 0)}
        </div>
      </div>
    </a>`;
  }).join('') : `<div style="text-align:center;padding:60px;color:var(--text2)">No trending videos in this category</div>`;
}

function switchTab(btn, cat) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeTab = cat;
  renderList(cat);
}

loadData();
</script>
</body>
</html>
