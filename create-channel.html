<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Channel — ViewTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080810;--bg2:#0f0f1a;--surface:#1a1a2e;--surface2:#22223a;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#a78bfa;--red:#ff4757;--text:#f0f0ff;--text2:#a0a0c0;--text3:#5a5a80;--radius:14px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(108,99,255,0.14),transparent 60%);pointer-events:none;}

  .back-link{align-self:flex-start;display:flex;align-items:center;gap:6px;color:var(--text2);text-decoration:none;font-size:14px;margin-bottom:32px;transition:.15s;}
  .back-link:hover{color:var(--text);}

  .page-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;margin-bottom:8px;}
  .page-sub{color:var(--text2);font-size:15px;margin-bottom:40px;}

  .form-card{width:100%;max-width:600px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;overflow:hidden;}

  /* BANNER */
  .banner-zone{position:relative;height:180px;background:linear-gradient(135deg,rgba(108,99,255,0.3),rgba(255,71,87,0.2));cursor:pointer;overflow:hidden;}
  .banner-zone img{width:100%;height:100%;object-fit:cover;display:none;}
  .banner-zone.has-img img{display:block;}
  .banner-zone.has-img .banner-hint{display:none;}
  .banner-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:rgba(255,255,255,0.6);font-size:14px;}
  .banner-edit-btn{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,0.6);color:white;border:1px solid rgba(255,255,255,0.2);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;backdrop-filter:blur(4px);}

  /* AVATAR ROW */
  .avatar-row{display:flex;align-items:flex-end;gap:16px;padding:0 28px;margin-top:-32px;margin-bottom:20px;}
  .avatar-zone{width:80px;height:80px;border-radius:50%;border:4px solid var(--bg2);background:linear-gradient(135deg,var(--accent),var(--red));cursor:pointer;overflow:hidden;flex-shrink:0;position:relative;}
  .avatar-zone img{width:100%;height:100%;object-fit:cover;}
  .avatar-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;border-radius:50%;}
  .avatar-zone:hover .avatar-overlay{opacity:1;}

  .form-body{padding:0 28px 28px;}
  .field{margin-bottom:20px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:7px;}
  .field input,.field textarea,.field select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.2s;resize:vertical;}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);background:var(--surface2);}
  .field input::placeholder,.field textarea::placeholder{color:var(--text3);}
  .field .hint{font-size:11px;color:var(--text3);margin-top:5px;}
  .handle-prefix{position:relative;}
  .handle-prefix input{padding-left:28px;}
  .handle-prefix::before{content:'@';position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}

  .color-picks{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .color-pick{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s;}
  .color-pick:hover,.color-pick.active{border-color:white;transform:scale(1.1);}

  .submit-btn{width:100%;background:linear-gradient(135deg,var(--accent),#5a52e0);color:white;border:none;padding:14px;border-radius:var(--radius);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:8px;}
  .submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(108,99,255,0.35);}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .error-box{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);color:#ff6b7a;font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:16px;display:none;}
  .error-box.show{display:block;}

  input[type=file]{display:none;}
</style>
</head>
<body>
<a href="index.html" class="back-link">
  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
  Back to ViewTube
</a>

<div class="page-title">Create Your Channel</div>
<div class="page-sub">Build your presence on ViewTube — upload videos, gain subscribers</div>

<div class="form-card">
  <!-- BANNER -->
  <div class="banner-zone" id="bannerZone" onclick="document.getElementById('bannerInput').click()">
    <img id="bannerImg" src="" alt="Channel Banner">
    <div class="banner-hint">
      <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Click to upload channel banner
    </div>
    <button class="banner-edit-btn" onclick="e=>e.stopPropagation()">Change Banner</button>
  </div>
  <input type="file" id="bannerInput" accept="image/*" onchange="loadBanner(this)">

  <!-- AVATAR ROW -->
  <div class="avatar-row">
    <div class="avatar-zone" onclick="document.getElementById('avatarInput').click()">
      <img id="avatarImg" src="" alt="Channel Avatar">
      <div class="avatar-overlay">
        <svg width="20" height="20" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
    </div>
    <div style="padding-bottom:4px;color:var(--text2);font-size:13px">Click avatar to upload a photo</div>
  </div>
  <input type="file" id="avatarInput" accept="image/*" onchange="loadAvatar(this)">

  <div class="form-body">
    <div class="error-box" id="errorBox"></div>

    <div class="field">
      <label>Channel Name *</label>
      <input type="text" id="chName" placeholder="My Awesome Channel" maxlength="60" oninput="syncHandle(this.value)">
    </div>

    <div class="field">
      <label>Handle *</label>
      <div class="handle-prefix">
        <input type="text" id="chHandle" placeholder="mychannel" maxlength="30" oninput="this.value=this.value.replace(/[^a-zA-Z0-9_]/g,'').toLowerCase()">
      </div>
      <div class="hint">Your unique URL: viewtube.com/@handle — only letters, numbers, underscores</div>
    </div>

    <div class="field">
      <label>Description</label>
      <textarea id="chDesc" placeholder="What is your channel about?" rows="4" maxlength="500"></textarea>
    </div>

    <div class="field">
      <label>Avatar Color (if no image uploaded)</label>
      <div class="color-picks" id="colorPicks"></div>
    </div>

    <button class="submit-btn" id="createBtn" onclick="doCreate()">Create Channel</button>
  </div>
</div>

<script src="vt-auth.js"></script>
<script>
const COLORS = ['0f172a','1e1b4b','0c0a09','0d1117','0f0f23','1a0a2e','0a1628','14000a','1a1400','001a14'];
let avatarDataUrl = '';
let bannerDataUrl = '';
let selectedColor = COLORS[0];

// Auth check
VT.initSeedData().then(() => {
  if (!VT.requireAuth('login.html?redirect=create-channel.html')) return;
  const user = VT.currentUser();
  // If user already has a channel, go to studio
  if (VT.getChannelByOwner(user.id)) { window.location.href = 'studio.html'; return; }
  // Default avatar
  document.getElementById('avatarImg').src = `https://api.dicebear.com/7.x/shapes/svg?seed=${encodeURIComponent(user.username)}&backgroundColor=${selectedColor}`;
});

// Color picks
const picks = document.getElementById('colorPicks');
COLORS.forEach((c, i) => {
  const div = document.createElement('div');
  div.className = 'color-pick' + (i === 0 ? ' active' : '');
  div.style.background = '#' + c;
  div.onclick = () => {
    document.querySelectorAll('.color-pick').forEach(p => p.classList.remove('active'));
    div.classList.add('active');
    selectedColor = c;
    if (!avatarDataUrl) {
      const name = document.getElementById('chName').value || 'channel';
      document.getElementById('avatarImg').src = `https://api.dicebear.com/7.x/shapes/svg?seed=${encodeURIComponent(name)}&backgroundColor=${c}`;
    }
  };
  picks.appendChild(div);
});

function syncHandle(name) {
  const handle = document.getElementById('chHandle');
  if (!handle._touched) {
    handle.value = name.toLowerCase().replace(/[^a-z0-9_]/g, '').slice(0, 30);
  }
  if (!avatarDataUrl) {
    document.getElementById('avatarImg').src = `https://api.dicebear.com/7.x/shapes/svg?seed=${encodeURIComponent(name||'channel')}&backgroundColor=${selectedColor}`;
  }
}
document.getElementById('chHandle').addEventListener('input', () => { document.getElementById('chHandle')._touched = true; });

function loadAvatar(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { avatarDataUrl = e.target.result; document.getElementById('avatarImg').src = avatarDataUrl; };
  reader.readAsDataURL(file);
}

function loadBanner(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    bannerDataUrl = e.target.result;
    document.getElementById('bannerImg').src = bannerDataUrl;
    document.getElementById('bannerZone').classList.add('has-img');
  };
  reader.readAsDataURL(file);
}

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = msg; b.classList.add('show');
}

function doCreate() {
  const name = document.getElementById('chName').value.trim();
  const handle = document.getElementById('chHandle').value.trim();
  const desc = document.getElementById('chDesc').value.trim();
  const btn = document.getElementById('createBtn');

  if (!name) { showError('Channel name is required.'); return; }
  if (!handle) { showError('Handle is required.'); return; }
  if (handle.length < 3) { showError('Handle must be at least 3 characters.'); return; }

  document.getElementById('errorBox').classList.remove('show');
  btn.disabled = true; btn.textContent = 'Creating channel…';

  setTimeout(() => {
    const user = VT.currentUser();
    const avatar = avatarDataUrl || `https://api.dicebear.com/7.x/shapes/svg?seed=${encodeURIComponent(name)}&backgroundColor=${selectedColor}`;
    const banner = bannerDataUrl || `https://picsum.photos/seed/${encodeURIComponent(handle)}/1200/300`;

    const result = VT.createChannel({ name, handle, description: desc, avatar, banner, ownerId: user.id });
    if (result.ok) {
      window.location.href = `channel.html?id=${result.channel.id}`;
    } else {
      showError(result.error);
      btn.disabled = false; btn.textContent = 'Create Channel';
    }
  }, 400);
}
</script>
</body>
</html>
