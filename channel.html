<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Channel — ViewTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080810;--bg2:#0f0f1a;--surface:#1a1a2e;--surface2:#22223a;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#a78bfa;--red:#ff4757;--text:#f0f0ff;--text2:#a0a0c0;--text3:#5a5a80;--verified:#60a5fa;--gold-v:#f59e0b;--black-v:#e2e2e2;--radius:12px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  /* TOPBAR */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;background:rgba(8,8,16,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 20px;}
  .logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--red));border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .logo-icon svg{width:18px;height:18px;fill:white;}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;}
  .logo-text span{color:var(--accent2);}
  .search-wrap{flex:1;max-width:500px;margin:0 auto;display:flex;}
  .search-input{flex:1;background:var(--surface);border:1px solid var(--border);border-right:none;color:var(--text);padding:0 16px;height:38px;border-radius:var(--radius) 0 0 var(--radius);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
  .search-input:focus{border-color:var(--accent);}
  .search-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);height:38px;width:48px;border-radius:0 var(--radius) var(--radius) 0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .topbar-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
  /* badge */
  .badge{display:inline-flex;align-items:center;}
  .badge-verified{color:var(--verified);}
  .badge-gold{color:var(--gold-v);}
  .badge-black{color:var(--black-v);}
  .badge-banned{font-size:13px;}

  /* BANNER */
  .channel-banner{height:200px;background:linear-gradient(135deg,rgba(108,99,255,0.4),rgba(255,71,87,0.2));overflow:hidden;margin-top:60px;}
  .channel-banner img{width:100%;height:100%;object-fit:cover;}

  /* CHANNEL HEADER */
  .channel-header{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:flex-end;gap:20px;margin-top:-40px;margin-bottom:0;position:relative;}
  .ch-avatar-wrap{width:90px;height:90px;border-radius:50%;overflow:hidden;border:4px solid var(--bg);background:var(--surface);flex-shrink:0;}
  .ch-avatar-wrap img{width:100%;height:100%;object-fit:cover;}
  .ch-meta{padding-bottom:8px;}
  .ch-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .ch-name-big{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
  .ch-handle-small{color:var(--text2);font-size:14px;margin-top:2px;}
  .ch-sub-count{font-size:13px;color:var(--text3);}
  .ch-right{margin-left:auto;display:flex;gap:10px;align-items:center;padding-bottom:8px;}
  .subscribe-btn{background:var(--text);color:var(--bg);border:none;padding:10px 24px;border-radius:20px;font-weight:700;font-size:14px;cursor:pointer;transition:.2s;}
  .subscribe-btn:hover{background:var(--accent2);color:white;}
  .subscribe-btn.subbed{background:var(--surface);color:var(--text2);border:1px solid var(--border);}
  .studio-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;text-decoration:none;transition:.2s;}
  .studio-btn:hover{background:var(--surface2);color:var(--text);}

  /* TABS */
  .channel-tabs{border-bottom:1px solid var(--border);margin-bottom:28px;}
  .tabs-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;gap:4px;}
  .tab-btn{background:none;border:none;color:var(--text2);font-size:14px;font-weight:600;padding:14px 20px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s;}
  .tab-btn:hover{color:var(--text);}
  .tab-btn.active{color:var(--text);border-bottom-color:var(--text);}

  /* CONTENT */
  .channel-content{max-width:1100px;margin:0 auto;padding:0 24px 60px;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* VIDEO GRID */
  .video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
  .video-card{cursor:pointer;text-decoration:none;color:inherit;display:block;}
  .video-card:hover .thumb-wrap{opacity:.85;}
  .thumb-wrap{position:relative;aspect-ratio:16/9;overflow:hidden;border-radius:var(--radius);background:var(--surface);}
  .thumb-wrap img{width:100%;height:100%;object-fit:cover;}
  .duration-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.85);color:white;font-size:12px;font-weight:600;padding:2px 7px;border-radius:6px;}
  .video-info{padding:10px 4px 6px;}
  .video-title{font-size:14px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px;}
  .video-stats{font-size:12px;color:var(--text3);}

  /* ABOUT TAB */
  .about-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:700px;}
  .about-desc{font-size:15px;color:var(--text2);line-height:1.7;white-space:pre-line;}
  .about-stats{margin-top:20px;display:flex;gap:24px;flex-wrap:wrap;}
  .about-stat{font-size:14px;color:var(--text2);}
  .about-stat strong{color:var(--text);}

  /* BANNED OVERLAY */
  .banned-overlay{background:rgba(255,71,87,0.08);border:1px solid rgba(255,71,87,0.2);border-radius:var(--radius);padding:20px;text-align:center;color:#ff6b7a;margin-bottom:24px;}
</style>
</head>
<body>
<header class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <span class="logo-text">View<span>Tube</span></span>
  </a>
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Search..." onkeydown="if(event.key==='Enter')VT.searchRedirect(this.value)">
    <button class="search-btn"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
  </div>
  <div class="topbar-right" id="topbarRight"></div>
</header>

<div id="channelBanner" class="channel-banner"></div>
<div class="channel-header" id="channelHeader"></div>

<div class="channel-tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="switchTab('videos',this)">Videos</button>
    <button class="tab-btn" onclick="switchTab('about',this)">About</button>
  </div>
</div>

<div class="channel-content">
  <div class="tab-panel active" id="tab-videos"></div>
  <div class="tab-panel" id="tab-about"></div>
</div>

<script src="vt-auth.js"></script>
<script>
const params = new URLSearchParams(location.search);
const channelId = params.get('id');

async function init() {
  await VT.initSeedData();
  VT.injectTopbarStyles();

  // Topbar right
  const user = VT.currentUser();
  const tr = document.getElementById('topbarRight');
  if (user) {
    tr.innerHTML = `<button class="studio-btn" style="background:none;border:none;cursor:pointer" onclick="VT.toggleUserDropdown()" title="${user.displayName||user.username}">
      <img src="${user.avatar}" style="width:34px;height:34px;border-radius:50%;border:2px solid var(--border);object-fit:cover" onerror="this.outerHTML='<div style=width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#ff4757);display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:14px>${(user.displayName||user.username).charAt(0).toUpperCase()}</div>'">
    </button>
    <div class="tb-dropdown" id="tbDropdown" style="position:absolute;top:56px;right:16px">
      <div class="tb-dropdown-header"><img src="${user.avatar}" class="tb-drop-avatar"><div><div class="tb-drop-name">${user.displayName||user.username}</div><div class="tb-drop-email">${user.email}</div></div></div>
      <div class="tb-dropdown-divider"></div>
      <a href="studio.html" class="tb-drop-item">Studio</a>
      <button class="tb-drop-item tb-drop-btn" onclick="VT.logout()">Sign Out</button>
    </div>`;
  } else {
    tr.innerHTML = `<a href="login.html" class="tb-sign-in-btn">Sign In</a>`;
  }

  if (!channelId) { document.body.innerHTML += '<div style="text-align:center;padding:100px;color:var(--text2)">Channel not found.</div>'; return; }

  const ch = VT.getChannel(channelId);
  if (!ch) { document.body.innerHTML += '<div style="text-align:center;padding:100px;color:var(--text2)">Channel not found.</div>'; return; }

  document.title = `${ch.name} — ViewTube`;

  // Banner
  const banner = document.getElementById('channelBanner');
  if (ch.banner) banner.innerHTML = `<img src="${ch.banner}" alt="banner" onerror="this.remove()">`;

  // Header
  const isOwner = user && ch.ownerId === user.id;
  const isSub = user ? VT.isSubscribed(user.id, ch.id) : false;

  document.getElementById('channelHeader').innerHTML = `
    <div class="ch-avatar-wrap"><img src="${ch.avatar}" alt="${ch.name}" onerror="this.style.background='var(--accent)'"></div>
    <div class="ch-meta">
      <div class="ch-name-row">
        <span class="ch-name-big">${ch.name}</span>
        ${VT.badgeHTML(ch, 18)}
      </div>
      <div class="ch-handle-small">${ch.handle}</div>
      <div class="ch-sub-count" id="subCountEl">${VT.fmtSubs(ch.subscriberCount||0)} subscribers</div>
    </div>
    <div class="ch-right">
      ${isOwner ? `<a href="studio.html" class="studio-btn">Studio</a>` : ''}
      ${ch.IsBanned ? `<span style="color:var(--red);font-size:14px;font-weight:600">🚫 Channel Banned</span>` :
        !isOwner ? `<button class="subscribe-btn ${isSub?'subbed':''}" id="subBtn" onclick="doSubscribe('${ch.id}')">${isSub?'Subscribed':'Subscribe'}</button>` : ''}
    </div>
  `;

  // Videos tab
  const videos = VT.getChannelVideos(ch.id);
  const vTab = document.getElementById('tab-videos');
  if (ch.IsBanned) {
    vTab.innerHTML = `<div class="banned-overlay">🚫 This channel has been banned. Content is unavailable.</div>`;
  } else if (videos.length === 0) {
    vTab.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text2)">No videos uploaded yet.</div>`;
  } else {
    vTab.innerHTML = `<div class="video-grid">${videos.map(v=>`
      <a href="watch.html?id=${v.id}" class="video-card">
        <div class="thumb-wrap">
          <img src="${v.thumbnail}" alt="${v.title}" loading="lazy">
          <span class="duration-badge">${v.duration}</span>
        </div>
        <div class="video-info">
          <div class="video-title">${v.title}</div>
          <div class="video-stats">${VT.fmtSubs(v.views||0)} views · ${v.uploadedAgo}</div>
        </div>
      </a>`).join('')}</div>`;
  }

  // About tab
  document.getElementById('tab-about').innerHTML = `
    <div class="about-card">
      <div class="about-desc">${ch.description || 'No description yet.'}</div>
      <div class="about-stats">
        <div class="about-stat"><strong>${VT.fmtSubs(ch.subscriberCount||0)}</strong> subscribers</div>
        <div class="about-stat"><strong>${videos.length}</strong> videos</div>
        <div class="about-stat">Joined <strong>${ch.createdAt ? new Date(ch.createdAt).toLocaleDateString() : 'a while ago'}</strong></div>
      </div>
    </div>
  `;
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

function doSubscribe(chId) {
  const user = VT.currentUser();
  if (!user) { window.location.href = 'login.html?redirect=channel.html?id=' + chId; return; }
  const result = VT.toggleSubscribe(user.id, chId);
  const btn = document.getElementById('subBtn');
  const countEl = document.getElementById('subCountEl');
  btn.textContent = result.subscribed ? 'Subscribed' : 'Subscribe';
  btn.className = 'subscribe-btn' + (result.subscribed ? ' subbed' : '');
  countEl.textContent = VT.fmtSubs(result.count) + ' subscribers';
}

init();
</script>
</body>
</html>
