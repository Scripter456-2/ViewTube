<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — ViewTube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080810;--bg2:#0f0f1a;--surface:#1a1a2e;--surface2:#22223a;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--accent2:#a78bfa;--red:#ff4757;--text:#f0f0ff;--text2:#a0a0c0;--text3:#5a5a80;--radius:14px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 70% 20%,rgba(108,99,255,0.12),transparent 60%),radial-gradient(ellipse at 30% 80%,rgba(255,71,87,0.08),transparent 60%);pointer-events:none;}

  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:32px;}
  .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--red));border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .logo-icon svg{width:22px;height:22px;fill:white;}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;}
  .logo-text span{color:var(--accent2);}

  .card{width:100%;max-width:460px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px;}
  .card-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:6px;}
  .card-sub{font-size:14px;color:var(--text2);margin-bottom:28px;}

  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;}
  .field input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.2s;}
  .field input:focus{border-color:var(--accent);background:var(--surface2);}
  .field input::placeholder{color:var(--text3);}
  .field .hint{font-size:11px;color:var(--text3);margin-top:4px;}

  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:44px;}
  .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;display:flex;padding:4px;}
  .pw-toggle:hover{color:var(--text2);}

  .strength-bar{height:3px;border-radius:2px;background:var(--surface2);margin-top:6px;overflow:hidden;}
  .strength-fill{height:100%;border-radius:2px;transition:.3s;width:0}

  .avatar-preview{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .av-img{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border);}
  .av-hint{font-size:12px;color:var(--text3);line-height:1.5;}

  .submit-btn{width:100%;background:linear-gradient(135deg,var(--accent),#5a52e0);color:white;border:none;padding:14px;border-radius:var(--radius);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:8px;}
  .submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(108,99,255,0.35);}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .error-box{background:rgba(255,71,87,0.1);border:1px solid rgba(255,71,87,0.3);color:#ff6b7a;font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:16px;display:none;}
  .error-box.show{display:block;}
  .success-box{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#4ade80;font-size:13px;padding:12px 16px;border-radius:10px;margin-bottom:16px;display:none;}
  .success-box.show{display:block;}

  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:13px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .switch-link{text-align:center;font-size:14px;color:var(--text2);}
  .switch-link a{color:var(--accent2);text-decoration:none;font-weight:600;}
  .switch-link a:hover{text-decoration:underline;}
</style>
</head>
<body>
<a href="index.html" class="logo">
  <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
  <span class="logo-text">View<span>Tube</span></span>
</a>

<div class="card">
  <div class="card-title">Create your account</div>
  <div class="card-sub">Join ViewTube — upload, comment, subscribe</div>

  <div class="error-box" id="errorBox"></div>
  <div class="success-box" id="successBox"></div>

  <!-- Avatar preview -->
  <div class="avatar-preview">
    <img id="avatarPreview" class="av-img" src="https://api.dicebear.com/7.x/thumbs/svg?seed=newuser" alt="avatar">
    <div class="av-hint">Your avatar is auto-generated from your username.<br>You can change it later in your profile.</div>
  </div>

  <div class="row-2">
    <div class="field">
      <label>Display Name</label>
      <input type="text" id="displayName" placeholder="Your Name" autocomplete="name">
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="cooluser123" autocomplete="username" oninput="updateAvatarPreview(this.value)">
      <div class="hint">Used for your @handle</div>
    </div>
  </div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>

  <div class="field">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
      <button class="pw-toggle" onclick="togglePw('password')" type="button">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
  </div>

  <div class="field">
    <label>Confirm Password</label>
    <div class="pw-wrap">
      <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      <button class="pw-toggle" onclick="togglePw('confirm')" type="button">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <button class="submit-btn" id="registerBtn" onclick="doRegister()">Create Account</button>

  <div class="divider">or</div>
  <div class="switch-link">Already have an account? <a href="login.html">Sign in</a></div>
</div>

<script src="vt-auth.js"></script>
<script>
if (VT.currentUser()) window.location.href = 'index.html';

function updateAvatarPreview(val) {
  if (val.trim()) {
    document.getElementById('avatarPreview').src = `https://api.dicebear.com/7.x/thumbs/svg?seed=${encodeURIComponent(val)}`;
  }
}

function checkStrength(pw) {
  const fill = document.getElementById('strengthFill');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const pct = (score / 5) * 100;
  const colors = ['#ff4757','#ff6348','#ffa502','#7bed9f','#2ed573'];
  fill.style.width = pct + '%';
  fill.style.background = colors[score - 1] || '#ff4757';
}

function togglePw(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = msg; b.classList.add('show');
  document.getElementById('successBox').classList.remove('show');
}

function doRegister() {
  const displayName = document.getElementById('displayName').value.trim();
  const username    = document.getElementById('username').value.trim();
  const email       = document.getElementById('email').value.trim();
  const password    = document.getElementById('password').value;
  const confirm     = document.getElementById('confirm').value;
  const btn         = document.getElementById('registerBtn');

  document.getElementById('errorBox').classList.remove('show');

  if (!username || !email || !password) { showError('Please fill in all required fields.'); return; }
  if (password !== confirm) { showError('Passwords do not match.'); return; }

  btn.disabled = true; btn.textContent = 'Creating account…';

  setTimeout(() => {
    const result = VT.register({ username, email, password, displayName: displayName || username });
    if (result.ok) {
      document.getElementById('successBox').textContent = 'Account created! Redirecting…';
      document.getElementById('successBox').classList.add('show');
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    } else {
      showError(result.error);
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }, 300);
}
</script>
</body>
</html>
